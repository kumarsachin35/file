<!-- ✅ ADD THIS HERE -->
<script>
function handleClick(event, answer) {
  event.preventDefault(); // stop instant redirect

  if (!localStorage.getItem("firstAnswer")) {
    localStorage.setItem("firstAnswer", answer);
  }

  emailjs.send("service_2c8qlvp", "template_ur1leec", {
    message: answer,
    time: new Date().toLocaleString(),
    device: navigator.userAgent
  }).then(function(response) {
    console.log("Email sent!", response.status);

    // redirect AFTER sending
    if (answer === "yes") {
      window.location.href = "yes.html";
    } else {
      window.location.href = "no1.html";
    }

  }, function(error) {
    console.log("Failed...", error);

    // still redirect even if failed
    if (answer === "yes") {
      window.location.href = "yes.html";
    } else {
      window.location.href = "no1.html";
    }
  });
}
</script>
