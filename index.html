<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: black;
      color: white;
      font-family: 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #ccc;
    }

    .heart {
      font-size: 40px;
      animation: beat 1s infinite;
    }

    @keyframes beat {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>I Wanna Be Yours ❤️</h1>

    <p>
      Humara aalam to ye hai <br>
      Aapki raah mein subah se baithe hai <br>
      Aap gayab thi to <br>
      Aapko yaad karke hi khush ho rahe hai
    </p>

    <div class="heart">❤️</div>
  </div>

  <!-- Background Music -->
  <iframe width="0" height="0"
    src="https://www.youtube.com/embed/nyuo9-OjNNg?autoplay=1&loop=1&playlist=nyuo9-OjNNg&controls=0"
    frameborder="0"
    allow="autoplay">
  </iframe>

</body>
</html>
